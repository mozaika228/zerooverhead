name: ci

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build ${{ matrix.os == 'windows-latest' && '--config Release' || '' }}
      - name: Test
        run: ctest --test-dir build --output-on-failure ${{ matrix.os == 'windows-latest' && '-C Release' || '' }}
